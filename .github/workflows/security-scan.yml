# Varredura de segurança — SCA + SAST + secret-scanning, GRÁTIS (sem GitHub
# Advanced Security). Roda no runner HOSPEDADO do GitHub (isolado — NÃO toca o
# runner self-hosted nem o disco de produção) e é SEPARADO do CI/CD de deploy.
#
# Tudo NÃO-BLOQUEANTE por ora (`|| true` + continue-on-error): os achados
# aparecem no LOG do job, mas não reprovam nada. Quando quiser que passe a
# barrar, é só remover os `|| true`.
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sca:
    name: SCA — OSV-Scanner
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      # OSV-Scanner lê o pnpm-lock.yaml direto (base OSV do Google). NÃO usa o
      # endpoint de audit aposentado do npm. Não-bloqueante por ora.
      - name: OSV-Scanner (SCA)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/google/osv-scanner:latest \
            scan --lockfile=/repo/pnpm-lock.yaml || true

  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Semgrep
        run: python3 -m pip install --quiet semgrep
      - name: Semgrep (regras públicas, não-bloqueante)
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/secrets \
            --metrics off || true

  secrets:
    name: Secret scanning — gitleaks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (histórico, redigido, não-bloqueante)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --redact --verbose || true
