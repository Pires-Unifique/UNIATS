# Dependabot — SCA de dependências. Config ENXUTA de propósito: o CI roda num
# runner self-hosted e cada PR dispara build Docker; então agrupamos tudo num PR
# só, ignoramos bumps MAJOR (breaking, revisão manual) e reduzimos a frequência.
# Alertas de CVE ligam em Settings → Advanced Security (Dependabot alerts).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    # Um PR só com todos os minor/patch — menos ruído e menos builds no runner.
    groups:
      todas-deps:
        patterns: ["*"]
    # Bumps MAJOR são breaking (ex.: nestjs 10→11, pino 9→10) — revisar à mão,
    # sem PR automático (evita a enxurrada que encheu o disco do runner).
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels: ["dependencies"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns: ["*"]
    labels: ["dependencies", "ci"]
