# =====================================================================
# nginx — Plataforma de Triagem (UniATS)
# ---------------------------------------------------------------------
# Dois hosts, ambos atrás de TLS, encaminhando para os processos locais:
#   https://uniats.unifique.com.br      -> 127.0.0.1:13000  (web / Next.js)
#   https://api-uniats.unifique.com.br  -> 127.0.0.1:13001  (API / NestJS)
#
# O front (Next.js) é chamado pelo NAVEGADOR; a API também. Por isso os
# DOIS hostnames precisam resolver no DNS e ser servidos por este nginx.
# Os processos podem ficar presos em 127.0.0.1 (não expostos na rede) —
# só este nginx fala com eles.
#
# Deploy (Debian/Ubuntu):
#   sudo cp uniats.conf /etc/nginx/sites-available/uniats.conf
#   sudo ln -s /etc/nginx/sites-available/uniats.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certificado: veja infra/nginx/README.md (Let's Encrypt, cert próprio ou
# self-signed). Ajuste os caminhos ssl_certificate / ssl_certificate_key.
# =====================================================================

# --- WebSocket upgrade (HMR do Next em dev e qualquer WS) ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------
# HTTP :80 — ACME (Let's Encrypt) + redirect para HTTPS
# ---------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name uniats.unifique.com.br api-uniats.unifique.com.br;

    # Desafio HTTP-01 do certbot (se for usar Let's Encrypt via webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------
# HTTPS :443 — FRONT (web / Next.js) -> 127.0.0.1:13000
# ---------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name uniats.unifique.com.br;

    # >>> AJUSTE os caminhos do certificado (ver README.md) <<<
    ssl_certificate     /etc/letsencrypt/live/uniats.unifique.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uniats.unifique.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Uploads (currículos/áudios podem ser grandes — ver AUDIO_MAX_BYTES).
    client_max_body_size 210m;

    location / {
        proxy_pass http://127.0.0.1:13000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        # WebSocket (HMR em dev / Next):
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

# ---------------------------------------------------------------------
# HTTPS :443 — API (NestJS) -> 127.0.0.1:13001
# ---------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api-uniats.unifique.com.br;

    # >>> AJUSTE os caminhos do certificado (ver README.md) <<<
    ssl_certificate     /etc/letsencrypt/live/api-uniats.unifique.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-uniats.unifique.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Uploads grandes (áudios de entrevista até ~200MB).
    client_max_body_size 210m;

    location / {
        proxy_pass http://127.0.0.1:13001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # IMPORTANTE (webhooks): NÃO altere/bufferize o corpo — a API valida
        # HMAC com o body bruto em /webhooks/gupy. proxy_pass preserva o body;
        # apenas evite `proxy_set_body` ou módulos que reescrevam o payload.
        proxy_request_buffering off;

        # Transcrição/análise podem demorar — timeouts folgados.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
