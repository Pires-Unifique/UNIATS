# =====================================================================
# Stack local de desenvolvimento — UNIATS
# =====================================================================
# Sobe Postgres 16 com pgvector + Redis 7 + MinIO (S3-compatível).
# Uso: docker compose -f infra/docker-compose.yml up -d
# =====================================================================

services:
  postgres:
    # pgvector já incluído (imagem oficial mantida pela comunidade pgvector)
    image: pgvector/pgvector:pg16
    container_name: uniats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uniats
      POSTGRES_PASSWORD: uniats
      POSTGRES_DB: uniats
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniats -d uniats"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: uniats-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      # 6379 cai numa faixa de portas reservada do Windows (WinNAT/Hyper-V),
      # que recusa o bind. Publicamos em 16379 no host (mesmo motivo do MinIO 19000).
      - "16379:6379"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: uniats-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: uniats
      MINIO_ROOT_PASSWORD: uniats-secret-change-me
    ports:
      - "19000:9000"   # API S3 (9000 cai em faixa reservada do Windows/Hyper-V)
      - "19001:9001"   # Console web (9001 idem)
    volumes:
      - ./storage:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    # Captura e-mails localmente (substitui o SendGrid em dev)
    image: mailhog/mailhog:v1.0.1
    container_name: uniats-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web

  waha:
    # WhatsApp HTTP API (self-hosted). Dashboard/QR em http://localhost:4000/dashboard
    # 4000 no host → 3000 no container (3000 fica com o Next.js dev server).
    image: devlikeapro/waha:latest
    container_name: uniats-waha
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      # Protege a API: clientes precisam mandar X-Api-Key com este valor.
      WAHA_API_KEY: 1061fd9dab428c6fe036a59485546ada6c6f78a96a902b80
      # Credenciais do dashboard web (basic auth).
      WAHA_DASHBOARD_USERNAME: uniats
      WAHA_DASHBOARD_PASSWORD: uniats
      # Engine WhatsApp Web padrão.
      WHATSAPP_DEFAULT_ENGINE: WEBJS
    volumes:
      # Persiste a sessão pareada (QR) entre reinícios.
      - ./waha-sessions:/app/.sessions

# Volumes nomeados ficam comentados — preferimos bind mounts para inspeção.
